<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree Component Showcase</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #212529;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    
    .showcase-item {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      overflow: auto;
      height: 400px;
    }
    
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #4263eb;
    }
    
    h2 {
      margin-top: 0;
      padding-bottom: 10px;
      border-bottom: 1px solid #e9ecef;
      font-size: 18px;
      color: #495057;
    }
    
    .search-container {
      margin-bottom: 10px;
    }
    
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      font-size: 14px;
    }
    
    button {
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #4263eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background-color: #364fc7;
    }
  </style>

</script>
<body>
  <h1>Tree Component Showcase</h1>
  
  <div class="container">
    <div class="showcase-item">
      <h2>Basic Tree</h2>
      <div>
        <button id="expand-all">Expand All</button>
        <button id="collapse-all">Collapse All</button>
      </div>
      <gds-tree id="basic-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>Multiple Selection</h2>
      <gds-tree id="selection-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>With Checkboxes</h2>
      <gds-tree id="checkbox-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>With Icons</h2>
      <gds-tree id="icons-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>With Connecting Lines</h2>
      <gds-tree id="lines-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>Searchable Tree</h2>
      <div class="search-container">
        <input type="text" id="search-input" placeholder="Search...">
      </div>
      <gds-tree id="search-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>Drag and Drop</h2>
      <p>Try dragging nodes to reorganize the tree</p>
      <gds-tree id="dragdrop-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>Editable Tree</h2>
      <p>Double-click a node to edit its label</p>
      <gds-tree id="editable-tree"></gds-tree>
    </div>
    
    <div class="showcase-item">
      <h2>Organization Chart</h2>
      <p>With custom node rendering</p>
      <gds-tree id="org-tree"></gds-tree>
    </div>
  </div>
</body>
